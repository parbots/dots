################################################################################
# Fonts
################################################################################

font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono Bold
italic_font      Cascadia Code PL Italic
bold_italic_font Cascadia Code PL Bold Italic

font_size 14.0

force_ltr no

# symbol_map
# narrow_symbols

disable_ligatures cursor

# font_features
modify_font underline_position 1

# box_drawing_scale

undercurl_style thin-sparse

underline_exclusion 1

text_composition_strategy platform

text_fg_override_threshold 0

################################################################################
# Text Cursor Customization
################################################################################

cursor none
cursor_text_color background

cursor_shape block
cursor_shape_unfocused hollow

cursor_beam_thickness 2.0
cursor_underline_thickness 2.0

cursor_blink_interval 0.5 ease-in-out
cursor_stop_blinking_after 20

cursor_trail 100
cursor_trail_delay 0.1 1.0
cursor_trail_start_threshold 2

################################################################################
# Scrollback
################################################################################

scrollback_lines 10000
scrollbar scrolled
scrollbar_interactive yes
scrollbar_jump_on_click yes

scrollbar_width 0.5
scrollbar_hover_width 1

scrollbar_handle_opacity 0.5
scrollbar_radius 0.3
scrollbar_gap 0.1
scrollbar_min_handle_height 1
scrollbar_hitbox_expansion 0.25

scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0.1

scrollbar_handle_color foreground
scrollbar_track_color foreground


scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 10

scrollback_fill_enlarged_window yes

wheel_scroll_multiplier 5.0
wheel_scroll_min_lines 1
touch_scroll_multiplier 1.0

################################################################################
# Mouse
################################################################################

mouse_hide_wait -1

# url_color
url_style curly
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
# url_excluded_characters
show_hyperlink_targets yes
underline_hyperlinks hover

copy_on_select no
clear_selection_on_clipboard_loss no
paste_actions quote-urls-at-prompt,confirm-if-large
strip_trailing_spaces smart

select_by_word_characters @-./_~?&=%+#
# select_by_word_characters_forward

click_interval -1.0

focus_follows_mouse no

pointer_shape_when_grabbed arrow
default_pointer_shape beam
pointer_shape_when_dragging beam

################################################################################
# Performance Tuning
################################################################################

# Delay between screen updates in milliseconds (default: 10)
# Lower = more responsive but higher CPU usage
repaint_delay 15

# Delay before processing accumulated input in milliseconds (default: 3)
# Lower = more responsive but higher CPU usage
input_delay 3

# Sync screen updates to monitor refresh rate (prevents tearing)
sync_to_monitor yes

################################################################################
# Terminal Bell
################################################################################

enable_audio_bell no
visual_bell_duration 2.0 ease-in-out
visual_bell_color none
window_alert_on_bell yes
bell_on_tab " "
command_on_bell none
bell_path none
linux_bell_theme __custom

################################################################################
# Window Layout
################################################################################

remember_window_size  yes
initial_window_width  80c
initial_window_height 25c

enabled_layouts splits

window_resize_step_cells 2
window_resize_step_lines 2

window_border_width 0.5pt
draw_minimal_borders yes

window_margin_width 0
single_window_margin_width -1

window_padding_width 5
single_window_padding_width -1

placement_strategy center

# active_border_color
# inactive_border_color
# bell_border_color

inactive_text_alpha 0.50

hide_window_decorations no

window_logo_path none
window_logo_position bottom-right
window_logo_alpha 0.5
window_logo_scale 0

resize_debounce_time 0.1 0.5
resize_in_steps no

visual_window_select_characters ABCDEFGHIJKLMNOPQRSTUVWXYZ

confirm_os_window_close -1 count-background

################################################################################
# Tab Bar
################################################################################

tab_bar_edge top

tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0

tab_bar_style powerline

tab_bar_align left

tab_bar_min_tabs 2

tab_switch_strategy previous

# tab_fade
# tab_separator
tab_powerline_style angled

tab_activity_symbol " "

tab_title_max_length 0
tab_title_template "{bell_symbol}{activity_symbol}{tab.progress_percent} {fmt.bold}{index}{fmt.nobold} {fmt.italic}{title}{fmt.noitalic}"
active_tab_title_template "{bell_symbol}{activity_symbol}{tab.progress_percent} {fmt.italic}{title}{fmt.noitalic}"

# active_tab_foreground
# active_tab_background
active_tab_font_style normal

# inactive_tab_foreground
# inactive_tab_background
inactive_tab_font_style normal

tab_bar_background none
tab_bar_margin_color none

################################################################################
# Color Scheme
################################################################################

# foreground
# background

background_opacity 1.0

background_blur 20

background_image none
background_image_layout tiled
background_image_linear no

# transparent_background_colors

dynamic_background_opacity no

background_tint 0.0
background_tint_gaps 1.0

dim_opacity 0.5

# selection_foreground none
# selection_background none

################################################################################
# Advanced
################################################################################

shell .
editor .

close_on_child_death no

# Remote control disabled for security
# To enable securely:
#   1. Generate: openssl rand -base64 32
#   2. Store in environment: export KITTY_RC_PASSWORD="your-password"
#   3. Use: remote_control_password env:KITTY_RC_PASSWORD
#   4. Set: allow_remote_control password
allow_remote_control no
listen_on none

# env

# filter_notification

# watcher

# exe_search_path

update_check_interval 24

startup_session none

clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size 1024

# file_transfer_confirmation_bypass

allow_hyperlinks yes

shell_integration enabled
allow_cloning ask
clone_source_strategies venv,conda,env_var,path

notify_on_cmd_finish invisible 10.0

term xterm-kitty
terminfo_type path

forward_stdio no

# menu_map

################################################################################
# OS Tweaks
################################################################################
wayland_titlebar_color system

macos_titlebar_color background
macos_option_as_alt both
macos_hide_from_tasks no
macos_quit_when_last_window_closed yes
macos_window_resizable yes
macos_thicken_font 0
macos_traditional_fullscreen no
macos_show_window_title_in all
macos_menubar_title_max_length 0
macos_custom_beam_cursor yes
macos_colorspace srgb

linux_display_server auto
wayland_enable_ime yes

################################################################################
# Keyboard Shortcuts
################################################################################

# remove default shortcuts
clear_all_shortcuts yes

# kitty mod key
kitty_mod ctrl+shift

# copy to clipboard
map ctrl+shift+c copy_to_clipboard
map super+c copy_to_clipboard

# paste from clipboard
map ctrl+shift+v paste_from_clipboard
map super+v paste_from_clipboard

# scroll one line up
map ctrl+shift+up scroll_line_up
map kitty_mod+alt+k scroll_line_up

# scroll one line down
map ctrl+shift+down scroll_line_down
map kitty_mod+alt+j scroll_line_down

# scroll to top
map ctrl+shift+home scroll_home
map super+home scroll_home

# scroll to bottom
map ctrl+shift+end scroll_end
map super+end scroll_end

# browse scrollback in pager
map kitty_mod+s show_scrollback

# browse output of last shell command in pager
map kitty_mod+g show_last_command_output

# split panes
map super+enter launch --location=hsplit --cwd=current
map super+shift+enter launch --location=vsplit --cwd=current

# new os window
map ctrl+shift+n new_os_window
map super+n new_os_window

# close window
map ctrl+shift+w close_window
map super+w close_window_with_confirmation

# resize panes
map ctrl+alt+h resize_window narrower
map ctrl+alt+l resize_window wider
map ctrl+alt+k resize_window taller
map ctrl+alt+j resize_window shorter
map ctrl+alt+0 resize_window reset

# select neighboring windows
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+l neighboring_window right
map super+h neighboring_window left
map super+j neighboring_window down
map super+k neighboring_window up
map super+l neighboring_window right

# move windows
map super+shift+h move_window left
map super+shift+j move_window down
map super+shift+k move_window up
map super+shift+l move_window right

# rotate split axis (toggle horizontal/vertical)
map super+shift+r layout_action rotate

# swap panes in current split
map super+shift+s layout_action rotate 180

# visually pick a window
map kitty_mod+f focus_visible_window
map super+f focus_visible_window


# new tab
map ctrl+shift+t new_tab
map super+t new_tab

# next tab
map ctrl+tab next_tab

# previous tab
map ctrl+shift+tab previous_tab

# close tab
map ctrl+shift+q close_tab

# select tabs
map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5
map kitty_mod+6 goto_tab 6
map kitty_mod+7 goto_tab 7
map kitty_mod+8 goto_tab 8
map kitty_mod+9 goto_tab 9
map kitty_mod+0 goto_tab 0
map super+1 goto_tab 1
map super+2 goto_tab 2
map super+3 goto_tab 3
map super+4 goto_tab 4
map super+5 goto_tab 5
map super+6 goto_tab 6
map super+7 goto_tab 7
map super+8 goto_tab 8
map super+9 goto_tab 9
map super+0 goto_tab 0

# open url
map kitty_mod+o open_url_with_hints
map kitty_mod+p>y kitten hints --type hyperlink

# insert with hints
map kitty_mod+p>f kitten hints --type path --program -
map kitty_mod+p>l kitten hints --type line --program -
map kitty_mod+p>w kitten hints --type word --program -
map kitty_mod+p>h kitten hints --type hash --program -

# debug kitty configuration
map kitty_mod+d debug_config

# reload kitty configuration
map kitty_mod+r load_config_file

# quit kitty
map super+q quit

# BEGIN_KITTY_THEME

# catppuccin-mocha
include catppuccin-mocha.conf

# END_KITTY_THEME
