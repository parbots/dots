name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # master as of 2026-07-14
        env:
          # The action checks each file individually; -x lets shellcheck
          # follow the sourced scripts/lib.sh instead of failing with SC1091.
          SHELLCHECK_OPTS: -x
        with:
          scandir: scripts

  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: tui/go.sum

      - name: Check formatting
        run: cd tui && test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

      - name: Build
        run: make build

      - name: Test
        run: cd tui && go test ./... -v

      - name: Vet
        run: cd tui && go vet ./...

  smoke-scripts:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run sync-script smoke tests
        run: bash scripts/ci-smoke.sh
